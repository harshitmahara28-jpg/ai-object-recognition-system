<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Vision System</h1>
        
        <video id="video" autoplay playsinline></video>
        
        <div class="controls">
            <button id="start-btn">Start AI Scan</button>
            <button id="repeat-btn" class="secondary">Repeat Voice</button>
        </div>

        <div id="status-box">
            <p id="result-text">System Ready...</p>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
